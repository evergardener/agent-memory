name: quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  source-and-unit:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.14"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --frozen --extra dev --extra migrations
      - run: uv run ruff check src integrations tests migrations scripts/predeploy_host_check.py
      - run: env PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYDANTIC_DISABLE_PLUGINS=__all__ uv run pytest -q
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run check-build
      - run: bash -n scripts/*.sh
