x-production-logging: &production-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    labels:
      agent-memory.deployment-tier: production
      agent-memory.deployment-mode: in-place-canary-to-production
    logging: *production-logging
    stop_grace_period: 60s

  migrate:
    labels:
      agent-memory.deployment-tier: production
      agent-memory.deployment-mode: in-place-canary-to-production
    logging: *production-logging
    pids_limit: 256

  api:
    labels:
      agent-memory.deployment-tier: production
      agent-memory.deployment-mode: in-place-canary-to-production
    logging: *production-logging
    pids_limit: 256
    stop_grace_period: 30s

  worker:
    labels:
      agent-memory.deployment-tier: production
      agent-memory.deployment-mode: in-place-canary-to-production
    logging: *production-logging
    pids_limit: 256
    stop_grace_period: 60s

  model-worker:
    profiles: ["model"]
    labels:
      agent-memory.deployment-tier: production
      agent-memory.deployment-mode: in-place-canary-to-production
    logging: *production-logging
    environment:
      AGENT_MEMORY_MODEL_API_KEY: ""
      AGENT_MEMORY_MODEL_API_KEY_FILE: /run/secrets/model_api_key
    secrets:
      - vault_root_key
      - model_api_key
    pids_limit: 256
    stop_grace_period: 60s

secrets:
  model_api_key:
    file: ${AGENT_MEMORY_MODEL_API_KEY_HOST_FILE:?set AGENT_MEMORY_MODEL_API_KEY_HOST_FILE}
